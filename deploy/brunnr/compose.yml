services:
  brunnrd:
    build:
      context: ../..
      dockerfile: Dockerfile
    command: ["--config", "/data/brunnr.toml", "--root", "/data"]
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_REST_URL: http://qdrant:6333
      # Set QDRANT_API_KEY in an env file or orchestrator secret store when auth is enabled.
    volumes:
      - brunnr-data:/data
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-storage:/qdrant/storage

volumes:
  brunnr-data:
  qdrant-storage:
