<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Aquifer Labs">
  <title>Aquifer Labs</title>
  <defs>
    <linearGradient id="seep" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16b3c9"/>
      <stop offset="1" stop-color="#1b6ca8"/>
    </linearGradient>
  </defs>
  <!-- the water-bearing layer (saturated aquifer band) -->
  <rect x="8" y="33" width="48" height="13" rx="3.5" fill="#1f8a70" opacity="0.16"/>
  <!-- water held in the layer -->
  <g fill="#1f8a70">
    <circle cx="20" cy="39.5" r="2.6"/>
    <circle cx="32" cy="39.5" r="2.6"/>
    <circle cx="44" cy="39.5" r="2.6"/>
  </g>
  <!-- caprock above, bedrock below -->
  <g stroke="#5b6770" stroke-linecap="round" fill="none">
    <line x1="11" y1="27" x2="53" y2="27" stroke-width="3"   opacity="0.50"/>
    <line x1="14" y1="20" x2="50" y2="20" stroke-width="2.6" opacity="0.34"/>
    <line x1="11" y1="52" x2="53" y2="52" stroke-width="3"   opacity="0.50"/>
  </g>
  <!-- a gentle seep rising from the layer -->
  <path d="M32 11 C 35.5 16, 36.5 18, 36.5 20.5 a4.5 4.5 0 0 1 -9 0 C 27.5 18, 28.5 16, 32 11 Z" fill="url(#seep)"/>
</svg>
