<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Artesian">
  <title>Artesian</title>
  <defs>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16b3c9"/>
      <stop offset="1" stop-color="#1b6ca8"/>
    </linearGradient>
  </defs>
  <!-- rock strata, split by the central wellbore -->
  <g stroke-linecap="round" fill="none">
    <!-- water-table layer (teal) -->
    <line x1="9"  y1="47" x2="27" y2="47" stroke="#1f8a70" stroke-width="4"/>
    <line x1="37" y1="47" x2="55" y2="47" stroke="#1f8a70" stroke-width="4"/>
    <!-- caprock strata, thinning toward the surface -->
    <g stroke="#5b6770">
      <line x1="11" y1="39" x2="27" y2="39" stroke-width="3.4" opacity="0.60"/>
      <line x1="37" y1="39" x2="53" y2="39" stroke-width="3.4" opacity="0.60"/>
      <line x1="14" y1="31" x2="27" y2="31" stroke-width="3"   opacity="0.45"/>
      <line x1="37" y1="31" x2="50" y2="31" stroke-width="3"   opacity="0.45"/>
      <line x1="17" y1="23" x2="27" y2="23" stroke-width="2.6" opacity="0.32"/>
      <line x1="37" y1="23" x2="47" y2="23" stroke-width="2.6" opacity="0.32"/>
    </g>
  </g>
  <!-- base pool -->
  <ellipse cx="32" cy="53" rx="7" ry="2.2" fill="#1b6ca8" opacity="0.22"/>
  <!-- pressurised water rising through the bore -->
  <rect x="29.4" y="17" width="5.2" height="35" rx="2.6" fill="url(#water)"/>
  <!-- artesian flow breaking the surface (droplet) -->
  <path d="M32 5 C 39 13, 39.5 15, 39.5 18.5 a7.5 7.5 0 0 1 -15 0 C 24.5 15, 25 13, 32 5 Z" fill="url(#water)"/>
</svg>
